          "name": "What is QuantaLLM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "QuantaLLM is an Android application that lets you run large language models entirely on your device with no internet connection required. It leverages the Qualcomm AI Engine and Hexagon NPU to deliver fast, private, on-device inference for a wide range of open-weight models."

        },

          "@type": "Question",
          "name": "Is QuantaLLM really 100% offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Once you have downloaded a model, all inference happens locally on your device hardware. No data is ever sent to external servers, and the app requires zero network connectivity to generate responses. You can even enable airplane mode and everything works perfectly."
          }
        },

          "@type": "Question",
          "name": "What Android version do I need to run QuantaLLM?",
          "acceptedAnswer": {

            "text": "QuantaLLM requires Android 12 (API 31) or later. Android 13+ is recommended for the best experience, as newer OS versions provide improved memory management that benefits on-device inference workloads."
          }
        },
        {
          "@type": "Question",
          "name": "What devices work best with QuantaLLM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Devices with Qualcomm Snapdragon 8 Gen 2 or newer processors deliver the best experience thanks to their powerful Hexagon NPU. Flagship phones like the Samsung Galaxy S24 Ultra, OnePlus 12, and Xiaomi 14 Pro are excellent choices. Devices with at least 8 GB of RAM are recommended."
          }
        },
        {
          "@type": "Question",
          "name": "What AI models does QuantaLLM support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "QuantaLLM supports 90+ open-weight model architectures in GGUF format including Llama 3, Mistral, Phi-3, Gemma 2, Qwen 2, and many more. Q2 through Q8 quantization levels are supported."
          }
        },
        {
          "@type": "Question",
          "name": "How fast is AI inference on Android with QuantaLLM?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On a Snapdragon 8 Gen 3 device with a 7B Q4 model, you can expect 12-15 tokens per second for generation. Prompt processing typically runs at 100-300+ tokens per second. Smaller models on newer hardware can exceed 40 tokens per second."
          }
        },
        {
          "@type": "Question",
          "name": "Can other apps use QuantaLLM for AI inference?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. QuantaLLM exposes an AIDL (Android Interface Definition Language) service that other apps can bind to for on-device inference. This allows third-party developers to integrate local LLM capabilities into their own apps without bundling a separate inference engine."
          }
        },

          }
        }
